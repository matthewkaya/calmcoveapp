backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: public/uploads
public_folder: /uploads
logo_url: /logos/calmcove-mark.svg

collections:
  - name: site-settings
    label: Site Settings
    delete: false
    files:
      - name: site-settings
        label: Site Settings
        file: content/site-settings.json
        format: json
        editor:
          preview: false
        fields:
          - label: Metadata
            name: metadata
            widget: object
            fields:
              - { label: Page Title, name: title, widget: string }
              - { label: Meta Description, name: description, widget: text }
          - label: Brand
            name: brand
            widget: object
            fields:
              - { label: Brand Name, name: name, widget: string }
              - { label: Tagline, name: tagline, widget: string }
              - { label: Project Label, name: projectLabel, widget: string }
              - { label: Footer Note, name: footerNote, widget: text }
          - label: Navigation
            name: navigation
            widget: list
            summary: "{{fields.label}}"
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Anchor Link, name: href, widget: string }
          - label: Social Links
            name: socialLinks
            widget: list
            summary: "{{fields.platform}}"
            fields:
              - { label: Platform, name: platform, widget: string }
              - { label: URL, name: url, widget: string }
          - label: Logos
            name: logos
            widget: object
            fields:
              - { label: Primary Logo, name: primary, widget: image }
              - { label: Brand Mark, name: mark, widget: image }

  - name: home
    label: Home Page Content
    delete: false
    files:
      - name: home
        label: Home Sections
        file: content/home.json
        format: json
        editor:
          preview: false
        fields:
          - label: Hero
            name: hero
            widget: object
            fields:
              - { label: Eyebrow, name: eyebrow, widget: string }
              - { label: Hero Title, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - { label: Primary CTA Label, name: primaryCtaLabel, widget: string }
              - { label: Primary CTA Link, name: primaryCtaHref, widget: string }
              - { label: Secondary CTA Label, name: secondaryCtaLabel, widget: string }
              - { label: Secondary CTA Link, name: secondaryCtaHref, widget: string }
              - label: Hero Stats
                name: stats
                widget: list
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Value, name: value, widget: string }
              - label: Hero Visual
                name: visual
                widget: object
                fields:
                  - { label: Image, name: src, widget: image }
                  - { label: Alt Text, name: alt, widget: string }
                  - { label: Caption, name: caption, widget: string }
          - label: Brand Overview
            name: brandOverview
            widget: object
            fields:
              - { label: Section Title, name: title, widget: string }
              - { label: Intro, name: intro, widget: text }
              - { label: What It Is, name: whatItIs, widget: text }
              - { label: What It Offers, name: whatItOffers, widget: text }
              - { label: Why It Exists, name: whyItExists, widget: text }
              - { label: Who It Is For, name: whoItIsFor, widget: text }
              - { label: Differentiator, name: differentiator, widget: text }
              - { label: Mission Statement, name: mission, widget: text }
              - { label: Positioning Statement, name: positioning, widget: text }
              - { label: App Preview Image, name: appPreviewImage, widget: image }
              - { label: App Preview Alt, name: appPreviewAlt, widget: string }
          - label: Target Market
            name: targetMarket
            widget: object
            fields:
              - { label: Section Title, name: title, widget: string }
              - { label: Intro, name: intro, widget: text }
              - { label: Demographics, name: demographics, widget: list }
              - { label: Psychographics, name: psychographics, widget: list }
              - { label: Behavioral Insights, name: behavioralInsights, widget: list }
              - { label: Online Habit Text, name: onlineHabitText, widget: text }
          - label: Brand Identity
            name: brandIdentity
            widget: object
            fields:
              - { label: Section Title, name: title, widget: string }
              - { label: Intro, name: intro, widget: text }
              - { label: Personality Traits, name: personality, widget: list }
              - { label: Tone of Voice, name: toneOfVoice, widget: text }
              - { label: Value Proposition, name: valueProposition, widget: text }
              - label: Color Palette
                name: colors
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: Name, name: name, widget: string }
                  - { label: Hex, name: hex, widget: string }
              - label: Typography
                name: typography
                widget: object
                fields:
                  - { label: Heading Font, name: heading, widget: string }
                  - { label: Body Font, name: body, widget: string }
                  - { label: Accent Notes, name: accent, widget: string }
              - { label: Imagery Direction, name: imageryDirection, widget: text }
              - { label: Logo Direction, name: logoDirection, widget: text }
          - label: Platform Strategy
            name: platformStrategy
            widget: object
            fields:
              - { label: Section Title, name: title, widget: string }
              - { label: Intro, name: intro, widget: text }
              - label: Platforms
                name: platforms
                widget: list
                summary: "{{fields.name}}"
                fields:
                  - { label: Platform Name, name: name, widget: string }
                  - { label: Strategic Role, name: role, widget: string }
                  - { label: Why It Fits, name: why, widget: text }
                  - { label: Focus Areas, name: focusAreas, widget: list }
          - label: Content Strategy
            name: contentStrategy
            widget: object
            fields:
              - { label: Section Title, name: title, widget: string }
              - { label: Intro, name: intro, widget: text }
              - { label: Content Pillars, name: contentPillars, widget: list }
              - { label: Post Formats, name: postFormats, widget: list }
              - { label: Posting Frequency, name: postingFrequency, widget: text }
              - { label: Engagement Methods, name: engagementMethods, widget: list }
              - { label: Calendar Intro, name: calendarIntro, widget: text }
          - label: Summary
            name: summary
            widget: object
            fields:
              - { label: Section Title, name: title, widget: string }
              - { label: Intro, name: intro, widget: text }
              - { label: Success Points, name: successPoints, widget: list }
              - { label: Group Members, name: groupMembers, widget: list }

  - name: personas
    label: Personas
    delete: false
    files:
      - name: personas
        label: Personas
        file: content/personas.json
        format: json
        editor:
          preview: false
        fields:
          - { label: Section Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Persona Cards
            name: items
            widget: list
            summary: "{{fields.name}}"
            fields:
              - { label: Name, name: name, widget: string }
              - { label: Age, name: age, widget: string }
              - { label: Lifestyle, name: lifestyle, widget: text }
              - { label: Pain Points, name: painPoints, widget: list }
              - { label: Goals, name: goals, widget: list }
              - { label: Platforms Used, name: platformsUsed, widget: list }
              - { label: Purchase Behavior, name: purchaseBehavior, widget: text }
              - { label: Narrative Summary, name: narrative, widget: text }
              - { label: Profile Image, name: image, widget: image }
              - { label: Image Alt, name: imageAlt, widget: string }

  - name: content-calendar
    label: Content Calendar
    delete: false
    files:
      - name: content-calendar
        label: Content Calendar
        file: content/content-calendar.json
        format: json
        editor:
          preview: false
        fields:
          - { label: Month Label, name: month, widget: string }
          - label: Calendar Entries
            name: entries
            widget: list
            summary: "{{fields.date}} - {{fields.platform}}"
            fields:
              - { label: Date, name: date, widget: string }
              - { label: Platform, name: platform, widget: string }
              - { label: Theme, name: theme, widget: string }
              - { label: Format, name: format, widget: string }
              - { label: Purpose, name: purpose, widget: text }
              - { label: CTA, name: cta, widget: string }

  - name: social-posts
    label: Sample Social Posts
    delete: false
    files:
      - name: social-posts
        label: Sample Social Posts
        file: content/social-posts.json
        format: json
        editor:
          preview: false
        fields:
          - { label: Section Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Posts
            name: posts
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Objective, name: objective, widget: string }
              - { label: Caption, name: caption, widget: text }
              - { label: Hashtags, name: hashtags, widget: list }
              - { label: CTA, name: cta, widget: string }
              - { label: Visual, name: visual, widget: image }
              - { label: Visual Alt, name: visualAlt, widget: string }

  - name: youtube
    label: YouTube Strategy
    delete: false
    files:
      - name: youtube
        label: YouTube Strategy
        file: content/youtube.json
        format: json
        editor:
          preview: false
        fields:
          - { label: Section Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - { label: Why It Fits, name: whyItFits, widget: text }
          - label: Video Concepts
            name: concepts
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { label: Title, name: title, widget: string }
              - { label: Purpose, name: purpose, widget: text }
              - { label: Target Viewer, name: targetViewer, widget: text }
              - { label: Key Message, name: keyMessage, widget: text }
              - { label: CTA, name: cta, widget: string }
              - { label: Storyboard Visual, name: storyboardVisual, widget: image }
              - { label: Storyboard Alt, name: storyboardAlt, widget: string }

  - name: paid-campaign
    label: Paid Campaign
    delete: false
    files:
      - name: paid-campaign
        label: Paid Campaign
        file: content/paid-campaign.json
        format: json
        editor:
          preview: false
        fields:
          - { label: Section Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Campaign
            name: campaign
            widget: object
            fields:
              - { label: Campaign Name, name: name, widget: string }
              - { label: Objective, name: objective, widget: text }
              - { label: Big Idea, name: bigIdea, widget: text }
              - { label: Emotional Hook, name: emotionalHook, widget: text }
              - { label: Tagline, name: tagline, widget: string }
              - { label: Audience Summary, name: audienceSummary, widget: text }
              - { label: Targeting Plan, name: targetingPlan, widget: list }
              - { label: Placement Plan, name: placementPlan, widget: list }
              - label: Mock Budget
                name: mockBudget
                widget: list
                summary: "{{fields.item}}"
                fields:
                  - { label: Item, name: item, widget: string }
                  - { label: Amount, name: amount, widget: string }
              - { label: Expected Outcomes, name: expectedOutcomes, widget: list }
              - label: Ad Mockups
                name: adMockups
                widget: list
                summary: "{{fields.headline}}"
                fields:
                  - { label: Headline, name: headline, widget: string }
                  - { label: Ad Copy, name: adCopy, widget: text }
                  - { label: CTA, name: cta, widget: string }
                  - { label: Visual, name: visual, widget: image }
                  - { label: Visual Alt, name: visualAlt, widget: string }
              - label: Dashboard Metrics
                name: metrics
                widget: list
                summary: "{{fields.label}}"
                fields:
                  - { label: Label, name: label, widget: string }
                  - { label: Value, name: value, widget: string }
                  - { label: Detail, name: detail, widget: string }

  - name: influencer-campaign
    label: Influencer Campaign
    delete: false
    files:
      - name: influencer-campaign
        label: Influencer Campaign
        file: content/influencer-campaign.json
        format: json
        editor:
          preview: false
        fields:
          - { label: Section Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: Campaign
            name: campaign
            widget: object
            fields:
              - { label: Campaign Name, name: name, widget: string }
              - { label: Influencer Handle, name: handle, widget: string }
              - { label: Follower Count, name: followerCount, widget: string }
              - { label: Primary Platform, name: primaryPlatform, widget: string }
              - { label: Audience Demographics, name: audienceDemographics, widget: text }
              - { label: Content Style, name: contentStyle, widget: text }
              - { label: Why They Fit, name: whyFit, widget: text }
              - { label: Sample Outreach Email, name: outreachEmail, widget: text }
              - { label: Campaign Concept, name: concept, widget: text }
              - { label: Deliverables, name: deliverables, widget: list }
              - label: Influencer Mockups
                name: mockups
                widget: list
                fields:
                  - { label: Caption, name: caption, widget: text }
                  - { label: Hashtags, name: hashtags, widget: list }
                  - { label: CTA, name: cta, widget: string }
                  - { label: Visual, name: visual, widget: image }
                  - { label: Visual Alt, name: visualAlt, widget: string }
              - { label: Organic Growth Tactics, name: organicGrowthTactics, widget: list }

  - name: analytics
    label: Analytics
    delete: false
    files:
      - name: analytics
        label: Analytics
        file: content/analytics.json
        format: json
        editor:
          preview: false
        fields:
          - { label: Section Title, name: title, widget: string }
          - { label: Intro, name: intro, widget: text }
          - label: KPI Cards
            name: kpis
            widget: list
            fields:
              - { label: Label, name: label, widget: string }
              - { label: Value, name: value, widget: string }
              - { label: Trend, name: trend, widget: string }
          - label: Channel Performance
            name: channelPerformance
            widget: list
            fields:
              - { label: Channel, name: channel, widget: string }
              - { label: Reach, name: reach, widget: number, value_type: int }
              - { label: Engagement Rate, name: engagementRate, widget: number, value_type: float }
              - { label: CTR, name: ctr, widget: number, value_type: float }
              - { label: Conversions, name: conversions, widget: number, value_type: int }
          - label: Weekly Trend
            name: weeklyTrend
            widget: list
            fields:
              - { label: Week, name: week, widget: string }
              - { label: Reach, name: reach, widget: number, value_type: int }
              - { label: Engagement, name: engagement, widget: number, value_type: float }
              - { label: Conversions, name: conversions, widget: number, value_type: int }
          - { label: Recommendations, name: recommendations, widget: list }

